version: '3.11'

services:
  redis:
    image: 'bitnami/redis:latest'
    platform: linux/x86_64
    environment:
      # ALLOW_EMPTY_PASSWORD: 'yes'
      REDIS_DISABLE_COMMANDS: 'FLUSHDB,FLUSHALL'
      REDIS_TLS_ENABLED: 'yes'
      REDIS_TLS_PORT_NUMBER: 6379
      REDIS_TLS_CERT_FILE: /opt/bitnami/redis/certs/server.crt
      REDIS_TLS_KEY_FILE: /opt/bitnami/redis/certs/server-unencrypted.key
      REDIS_TLS_CA_FILE: /opt/bitnami/redis/certs/root.crt
      REDIS_TLS_AUTH_CLIENTS: 'yes'
      REDIS_PASSWORD: redis123
    ports:
      - '6379:6379'
    volumes:
      - ./certs/redis:/opt/bitnami/redis/certs
      - redis_data:/bitnami/redis/data

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    ports:
      - 2181:2181
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SERVER_CNXN_FACTORY: org.apache.zookeeper.server.NettyServerCnxnFactory
      ZOOKEEPER_SSL_CLIENT_AUTH: none
      SERVER_JVMFLAGS: '-D jdk.tls.rejectClientInitiatedRenegotiation=true'
    volumes:
      - ./certs/kafka:/etc/kafka/secrets

  broker:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
      - 9093:9093
    environment:
      KAFKA_ZOOKEEPER_PROTOCOL: PLAINTEXT
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_BROKER_ID: 1
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092,TLS://broker:29093,TLS_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,TLS:SSL,TLS_HOST:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/broker.pem
      KAFKA_SSL_KEY_PASSWORD: kafka12345
      KAFKA_SSL_KEYSTORE_TYPE: PEM
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/root.crt
      KAFKA_SSL_TRUSTSTORE_TYPE: PEM
      KAFKA_SSL_CLIENT_AUTH: "required"
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: 'true'
      KAFKA_AUTHORIZER_CLASS_NAME: kafka.security.authorizer.AclAuthorizer
      # KAKFA_OPTS: '-Djavax.net.debug=ssl'
    volumes:
      - ./certs/kafka:/etc/kafka/secrets

volumes:
  redis_data:
    driver: local

